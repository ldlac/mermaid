<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermaid Live Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5/theme/material-darker.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5/mode/javascript/javascript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/edit/matchbrackets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5/addon/edit/closebrackets.js"></script>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Diagrams</span>
        <button id="new-diagram" class="btn-small" title="New diagram">+</button>
      </div>
      <div id="diagram-list" class="diagram-list"></div>
    </aside>

    <header class="header">
      <div class="logo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <span>Mermaid Editor</span>
      </div>
      <div class="diagram-title">
        <input type="text" id="diagram-name" placeholder="Untitled" />
      </div>
      <div class="actions">
        <button id="share-link" class="btn" title="Copy shareable link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Share
        </button>
        <button id="copy-png" class="btn" title="Copy as PNG">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
        <button id="save-diagram" class="btn" title="Save diagram">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Save
        </button>
        <button id="export-png" class="btn" title="Export as PNG">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          PNG
        </button>
        <button id="export-svg" class="btn" title="Export as SVG">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          SVG
        </button>
      </div>
    </header>

    <main class="main">
      <section class="editor-pane">
        <div class="pane-header">
          <span>Code</span>
          <span id="" class="badge">code</span>
        </div>
        <div class="editor-container">
          <textarea
            id="code-editor"
            spellcheck="false"
            placeholder="Enter your mermaid diagram code here..."
          ></textarea>
        </div>
      </section>

      <div class="divider"></div>

      <section class="preview-pane">
        <div class="pane-header">
          <span>Preview</span>
          <div class="zoom-controls">
            <span id="diagram-type" class="badge">-</span>
            <span id="zoom-level" class="zoom-level">100%</span>
            <button id="zoom-out" class="btn-small" title="Zoom out">−</button>
            <button id="zoom-in" class="btn-small" title="Zoom in">+</button>
            <button id="zoom-reset" class="btn-small" title="Reset zoom">⟲</button>
          </div>
        </div>
        <div class="preview-container">
          <div id="diagram-output"></div>
          <div id="error-display" class="error hidden"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
